model:
  state_dim: 512
  action_dim: 5
  hidden_dim: 256
  max_docs: 10
  use_pretrained_encoder: false
  allow_remote_model_download: false
claim_extractor:
  rule_engine_enabled: true
  llm_extractor_enabled: false
  min_confidence: 0.7
cross_validator:
  tolerance_method: adaptive
  numerical_strict_mode: true
attack_simulator:
  seed: 42
  max_injection_docs: 10
  min_text_length: 20
defense:
  light_verify_threshold: 0.3
  deep_verify_threshold: 0.6
  reject_threshold: 0.8
  enable_four_layer: true
  use_neural_policy: false
  policy_deterministic: true
  enable_doc_scorer: true
  enable_nq_doc_policy: true
  nq_doc_policy_checkpoint: experiments/ms_marco_doc_policy_qwen_reward_official_mixed_dataset_scorer_checkpoints/nq_doc_policy_final.pt
  nq_doc_policy_deterministic: true
  nq_doc_policy_max_docs: 32
  enable_conflict_aware_generation: true
  enable_verification_guided_evidence: true
  conflict_aware_query_instruction: false
  conflict_aware_generation:
    high_risk_threshold: 0.7
    conflict_risk_threshold: 0.45
    support_floor: 0.1
    support_rescue_threshold: 0.45
    support_rescue_max_attack_prob: 0.55
    support_rescue_max_conflict: 0.35
    hard_drop_threshold: 0.88
    min_docs: 1
    max_drop_fraction: 0.85
    abstain_if_no_safe_docs: true
  doc_filter_threshold: 0.5
  doc_score_detection_threshold: 0.5
  min_docs_after_filter: 1
  max_doc_drop_fraction: 0.85
  feature_extractor:
    embedding_dim: 768
    max_docs: 32
  doc_scorer:
    type: learned
    model_path: experiments/doc_scorer/ms_marco_official_mixed_train_learned_doc_scorer.pt
    ensemble_weight: 1.0
    use_source_prior: false
reward:
  weights:
    correctness: 0.5
    safety: 0.3
    efficiency: 0.15
    verification: 0.05
  adaptive_schedule: false
training:
  seed: 42
evaluation:
  datasets:
  - ms_marco
  n_questions: 500
  split_map:
    ms_marco: test
  n_attacks: 5
  attack_types:
  - poisonedrag_lm_targeted
  - poisonedrag_hotflip
  - garag
  - tan_et_al
  - advdecoding
  seeds:
  - 42
  require_fixed_attacks: true
data:
  data_dir: data_official_mixed_attack_multidataset_split
  datasets:
  - ms_marco
  min_samples: 100
env:
  state_dim: 512
  action_dim: 5
  max_steps_per_episode: 1
  attack_probability: 0.5
benchmark:
  fixed_attacks: true
  gold_only: true
  data_dir: data_official_mixed_attack_multidataset_split
  manifest: data_official_mixed_attack_multidataset_split/official_mixed_attack_multidataset_split_manifest.json
  train_data_dir: data_official_mixed_attack_ms_marco_train_alias
  train_protocol: official-mixed MS MARCO train split; held-out MS MARCO-500 official-mixed test
  clean_context_source: MS MARCO qrels plus official corpus fallback
  attack_source: official/public artifacts converted to VeriRAG fixed-attack schema
